<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>წესები და პირობები</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px 20px 32px;
      background: #ffffff;
      color: #222222;
      line-height: 1.65;
      font-size: 15px;
    }
    .updated {
      color: #999999;
      font-size: 14px;
      margin: 0 0 20px;
    }
    h2 {
      color: #E63946;
      font-size: 17px;
      font-weight: bold;
      margin: 24px 0 8px;
    }
    p {
      margin: 0 0 12px;
    }
  </style>
</head>
<body>
  <p class="updated">ბოლო განახლება: [თარიღი]</p>
  <p><strong>შენიშვნა:</strong> ჩაანაცვლეთ ეს ფაილი სრული ქართული წესებისა და პირობების ტექსტით (ცვლილების გარეშე).</p>
  <h2>1. სათაური</h2>
  <p>პარაგრაფის მაგალითი.</p>
</body>
</html>
